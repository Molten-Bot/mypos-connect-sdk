openapi: 3.0.3
info:
  title: MyPOS Connect API
  version: "2.0"
  contact:
    name: MyPOS Connect Support
    email: support@tricityretail.com
  license:
    name: MIT
    url: https://opensource.org/license/mit/
  description: |
    OpenAPI description derived from "MyPOS Connect API V2" document version 1.4.

    The API uses JWT bearer tokens for most calls. Tokens are obtained from
    `POST /auth/token` and are valid for 120 minutes. All POST and PUT request
    bodies are JSON.
servers:
  - url: https://api.myposconnect.com/api/v2
    description: Production
tags:
  - name: Auth
    description: Authenticate API users and obtain short-lived JWT bearer tokens.
  - name: Customers
    description: Create, retrieve, and update local and global customers.
  - name: Inventory
    description: Reserve inventory and inspect quantities committed to web orders.
  - name: Products
    description: Retrieve general, store-specific, and serialized product data.
  - name: Rewards
    description: Reserve or reverse customer reward points before sale processing.
  - name: Sales
    description: Insert completed sales or cancel quantities committed to an order.
  - name: Stores
    description: Discover stores used by product, inventory, and sale operations.
security:
  - bearerAuth: []
paths:
  /auth/token:
    post:
      operationId: authTokensCreate
      tags:
        - Auth
      summary: Get an API token
      description: |
        Authenticate with API user email and password to obtain a JWT bearer
        token. The source document describes email/password authentication and
        shows Postman Authorization setup, but does not include the exact body
        schema from Figure 1; clients may need to provide credentials according
        to their provisioned API account.
      security:
        - basicAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthTokenRequest"
      responses:
        "200":
          description: Token returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "4XX":
          $ref: "#/components/responses/ClientError"
        "5XX":
          $ref: "#/components/responses/ServerError"

  /naproducts:
    get:
      operationId: productsList
      tags:
        - Products
      summary: List general product data
      description: |
        Returns general/static product details such as descriptions, notes,
        classification and related product fields. Pagination is recommended for
        large result sets.
      parameters:
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/FieldList"
        - $ref: "#/components/parameters/ProductSortKey"
        - $ref: "#/components/parameters/WebProductFilter"
        - $ref: "#/components/parameters/ActiveFilter"
        - $ref: "#/components/parameters/StyleCodeFilter"
      responses:
        "200":
          description: Product list returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
        "4XX":
          $ref: "#/components/responses/ClientError"
        "5XX":
          $ref: "#/components/responses/ServerError"

  /naproducts/{ProductCode}:
    get:
      operationId: productsRetrieve
      tags:
        - Products
      summary: Get general details for a single product
      parameters:
        - $ref: "#/components/parameters/ProductCode"
        - $ref: "#/components/parameters/FieldList"
      responses:
        "200":
          description: Product returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "4XX":
          $ref: "#/components/responses/ClientError"
        "5XX":
          $ref: "#/components/responses/ServerError"

  /naproducts/~{LastEditDate}:
    get:
      operationId: productsListChanged
      tags:
        - Products
      summary: List general products changed since a date
      parameters:
        - $ref: "#/components/parameters/LastEditDate"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/FieldList"
        - $ref: "#/components/parameters/ProductSortKey"
      responses:
        "200":
          description: Changed products returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
        "4XX":
          $ref: "#/components/responses/ClientError"
        "5XX":
          $ref: "#/components/responses/ServerError"

  /products:
    get:
      operationId: productsListAlternate
      tags:
        - Products
      summary: List products
      description: |
        Product listing endpoint shown in the source document for active product
        filtering. Most product examples use `/naproducts`; this path is included
        as documented.
      parameters:
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/FieldList"
        - $ref: "#/components/parameters/ProductSortKey"
        - $ref: "#/components/parameters/WebProductFilter"
        - $ref: "#/components/parameters/ActiveFilter"
        - $ref: "#/components/parameters/StyleCodeFilter"
      responses:
        "200":
          description: Product list returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
        "4XX":
          $ref: "#/components/responses/ClientError"
        "5XX":
          $ref: "#/components/responses/ServerError"

  /productspq/~{StoreCode}~{LastEditDate}:
    get:
      operationId: productsStoreDataListChanged
      tags:
        - Products
      summary: List store product price, cost, quantity and tax changes
      description: |
        Returns price, cost, quantity available and tax for all products modified
        after the specified UTC date/time. The documented path uses two `~`
        separators.
      parameters:
        - $ref: "#/components/parameters/StoreCode"
        - $ref: "#/components/parameters/LastEditDate"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Page"
      responses:
        "200":
          description: Store product data returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreProductListResponse"
        "4XX":
          $ref: "#/components/responses/ClientError"
        "5XX":
          $ref: "#/components/responses/ServerError"

  /productspq/{StoreCode}~{ProductCode}:
    get:
      operationId: productsStoreDataRetrieve
      tags:
        - Products
      summary: Get store price and quantity for a product
      parameters:
        - $ref: "#/components/parameters/StoreCode"
        - $ref: "#/components/parameters/ProductCode"
      responses:
        "200":
          description: Store product data returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreProduct"
        "4XX":
          $ref: "#/components/responses/ClientError"
        "5XX":
          $ref: "#/components/responses/ServerError"

  /productspqo/~{StoreCode}~{LastEditDate}:
    get:
      operationId: productsStoreDataListChangedWithOnOrder
      tags:
        - Products
      summary: List store product changes including quantity on order
      description: |
        Returns price, cost, quantity available, tax and quantity on order for
        all products modified after the specified UTC date/time.
      parameters:
        - $ref: "#/components/parameters/StoreCode"
        - $ref: "#/components/parameters/LastEditDate"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Page"
      responses:
        "200":
          description: Store product data returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreProductListResponse"
        "4XX":
          $ref: "#/components/responses/ClientError"
        "5XX":
          $ref: "#/components/responses/ServerError"

  /productspqo/{StoreCode}~{ProductCode}:
    get:
      operationId: productsStoreDataRetrieveWithOnOrder
      tags:
        - Products
      summary: Get store price, quantity, tax and quantity on order for a product
      parameters:
        - $ref: "#/components/parameters/StoreCode"
        - $ref: "#/components/parameters/ProductCode"
      responses:
        "200":
          description: Store product data returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreProduct"
        "4XX":
          $ref: "#/components/responses/ClientError"
        "5XX":
          $ref: "#/components/responses/ServerError"

  /ProductSerial/{StoreCode}~{ProductCode}~{SerialNumber}:
    get:
      operationId: productsSerialNumbersRetrieveStatus
      tags:
        - Products
      summary: Get product serial number status
      description: |
        Serial number status values: `-1` Not Found, `0` Available, `1` Sold,
        `2` Transferred Out, `3` Returned, `4` Deleted, `5` In Limbo.
      parameters:
        - $ref: "#/components/parameters/StoreCode"
        - $ref: "#/components/parameters/ProductCode"
        - name: SerialNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Serial number status returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerialNumberStatusResponse"
        "4XX":
          $ref: "#/components/responses/ClientError"
        "5XX":
          $ref: "#/components/responses/ServerError"

  /naCustomers:
    post:
      operationId: customersCreate
      tags:
        - Customers
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Customer"
      responses:
        "200":
          description: Customer created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "4XX":
          $ref: "#/components/responses/ClientError"
        "5XX":
          $ref: "#/components/responses/ServerError"

  /naCustomers/{CustomerCode}:
    get:
      operationId: customersRetrieve
      tags:
        - Customers
      summary: Get a customer
      description: |
        Customers are looked up by customer code by default. A database can be
        configured to look up this value as an email address instead.
      parameters:
        - $ref: "#/components/parameters/CustomerCode"
      responses:
        "200":
          description: Customer returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "4XX":
          $ref: "#/components/responses/ClientError"
        "5XX":
          $ref: "#/components/responses/ServerError"
    put:
      operationId: customersUpdate
      tags:
        - Customers
      summary: Update a customer
      parameters:
        - $ref: "#/components/parameters/CustomerCode"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Customer"
      responses:
        "200":
          description: Customer updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "4XX":
          $ref: "#/components/responses/ClientError"
        "5XX":
          $ref: "#/components/responses/ServerError"

  /globalcustomers/{EmailAddress}:
    get:
      operationId: customersGlobalRetrieve
      tags:
        - Customers
      summary: Get a global customer
      parameters:
        - $ref: "#/components/parameters/EmailAddress"
      responses:
        "200":
          description: Global customer returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlobalCustomer"
        "4XX":
          $ref: "#/components/responses/ClientError"
        "5XX":
          $ref: "#/components/responses/ServerError"
    put:
      operationId: customersGlobalUpdate
      tags:
        - Customers
      summary: Update a global customer
      description: Global Customers support a limited set of fields for update.
      parameters:
        - $ref: "#/components/parameters/EmailAddress"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GlobalCustomer"
      responses:
        "200":
          description: Global customer updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlobalCustomer"
        "4XX":
          $ref: "#/components/responses/ClientError"
        "5XX":
          $ref: "#/components/responses/ServerError"

  /Stores:
    get:
      operationId: storesList
      tags:
        - Stores
      summary: List stores
      parameters:
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Page"
      responses:
        "200":
          description: Store list returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreListResponse"
        "4XX":
          $ref: "#/components/responses/ClientError"
        "5XX":
          $ref: "#/components/responses/ServerError"

  /CommitQty:
    post:
      tags:
        - Inventory
      operationId: inventoryCommitmentsCreate
      summary: Insert committed quantities
      description: |
        Reserves inventory for a web order before the sale is finalized.
        Negative commit values can reverse individual committed quantities.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommitQuantityRequest"
      responses:
        "200":
          description: Committed quantities inserted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationResponse"
        "4XX":
          $ref: "#/components/responses/ClientError"
        "5XX":
          $ref: "#/components/responses/ServerError"

  /CommitQty/{OrderNumber}:
    get:
      tags:
        - Inventory
      operationId: inventoryCommitmentsRetrieve
      summary: View committed quantities for an order
      parameters:
        - $ref: "#/components/parameters/OrderNumber"
      responses:
        "200":
          description: Committed quantities returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommitQuantityResponse"
        "4XX":
          $ref: "#/components/responses/ClientError"
        "5XX":
          $ref: "#/components/responses/ServerError"

  /CommitPts:
    post:
      tags:
        - Rewards
      operationId: rewardsCommitmentsCreate
      summary: Commit or reverse customer reward points
      description: |
        Reserve reward points before final sale processing. Send negative
        `Points` values to commit points and positive values to reverse a
        previous point commitment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommitPointsRequest"
            examples:
              commit:
                summary: Commit reward points
                value:
                  CommittedPoints:
                    - StoreCode: "1"
                      OrderNumber: "801"
                      EmailAddress: lucy@test.com
                      Points: -400
              reverse:
                summary: Reverse committed reward points
                value:
                  CommittedPoints:
                    - StoreCode: "1"
                      OrderNumber: "801"
                      EmailAddress: lucy@test.com
                      Points: 400
      responses:
        "200":
          description: Points committed or reversed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationResponse"
        "4XX":
          $ref: "#/components/responses/ClientError"
        "5XX":
          $ref: "#/components/responses/ServerError"

  /Sale:
    post:
      operationId: salesCreate
      tags:
        - Sales
      summary: Insert a sale or cancel committed quantities
      description: |
        Inserts sales with billing customer, shipping customer, items, taxes and
        optional discounts. Customers are located by email address; missing
        customers are created and changed customer name/address details are
        updated.

        To cancel all committed quantities associated with an order that will not
        be processed, send a sale record with the order number, store code and a
        sale total of `0.00`, as shown in the source document.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaleRequest"
            examples:
              cancelCommittedQuantities:
                summary: Cancel all committed quantities for an order
                value:
                  Sales:
                    - SaleDate: "2020-11-19"
                      OrderNumber: "1008"
                      StoreCode: "001"
                      SaleTotal: "0.00"
              rewardPointsSale:
                summary: Sale paid partly with reward points
                value:
                  Sales:
                    - SaleDate: "2020-07-30T18:00:00"
                      OrderNumber: "801"
                      StoreCode: "1"
                      OrderComment: Order Comments go here
                      RewardPointsSpent: 400
                      CustomerBillTo:
                        FirstName: Lucy
                        LastName: Smyth
                        CompanyName: ""
                        Address: 13168 Spruce St
                        City: Toronto
      responses:
        "200":
          description: Sale inserted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationResponse"
        "4XX":
          $ref: "#/components/responses/ClientError"
        "5XX":
          $ref: "#/components/responses/ServerError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    basicAuth:
      type: http
      scheme: basic

  parameters:
    PageSize:
      name: liPageSize
      in: query
      description: Number of records to return per page.
      schema:
        type: integer
        minimum: 1
      example: 10
    Page:
      name: liPage
      in: query
      description: Page number to return.
      schema:
        type: integer
        minimum: 1
      example: 1
    FieldList:
      name: sFieldList
      in: query
      description: Comma-separated list of fields to return.
      schema:
        type: string
      example: productCode,longDescription
    ProductSortKey:
      name: sSortKey
      in: query
      description: Sort column followed by ASC or DESC.
      schema:
        type: string
        pattern: ^([Aa]ctive|[Cc]reationDate|[Cc]reationDeviceName|[Cc]reationUserName|[Ll]astEditDate|[Ll]astEditDeviceName|[Ll]astEditUserName|[Ll]ongDescription|[Pp]rice01|[Pp]roductCode|[Pp]roductReportingClass|[Pp]roductType|[Ss]hortDescription|[Ss]tockControl)(ASC|DESC)$
      example: productCodeASC
    WebProductFilter:
      name: filt_webproduct_bool
      in: query
      description: Filter products by Web Product flag.
      schema:
        type: boolean
      example: true
    ActiveFilter:
      name: filt_active_bool
      in: query
      description: Filter products by Active flag.
      schema:
        type: boolean
      example: true
    StyleCodeFilter:
      name: filt_stylecode_str
      in: query
      description: Filter products by style code.
      schema:
        type: string
      example: STY001
    ProductCode:
      name: ProductCode
      in: path
      required: true
      schema:
        type: string
    StoreCode:
      name: StoreCode
      in: path
      required: true
      schema:
        type: string
      example: "001"
    LastEditDate:
      name: LastEditDate
      in: path
      required: true
      description: UTC date or date/time. Store product calls require 24-hour clock format.
      schema:
        type: string
      examples:
        dateOnly:
          value: "2020-11-16"
        utcDateTime:
          value: "2020-11-16T13:45:00"
    CustomerCode:
      name: CustomerCode
      in: path
      required: true
      description: Customer code, or email address when database lookup is configured that way.
      schema:
        type: string
      example: lucy@test.com
    EmailAddress:
      name: EmailAddress
      in: path
      required: true
      schema:
        type: string
        format: email
      example: lucy@test.com
    OrderNumber:
      name: OrderNumber
      in: path
      required: true
      schema:
        type: string
      example: "1008"

  responses:
    ClientError:
      description: The request was rejected by the API.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ServerError:
      description: The API could not complete the request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    AuthTokenRequest:
      type: object
      description: Email/password credential payload if required by the deployment.
      properties:
        EmailAddress:
          type: string
          format: email
        Password:
          type: string
          format: password
      additionalProperties: true
    AuthTokenResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT bearer token.
        expiresIn:
          type: integer
          description: Token lifetime in seconds.
          example: 7200
      additionalProperties: true
    ProductListResponse:
      oneOf:
        - type: array
          items:
            $ref: "#/components/schemas/Product"
        - type: object
          properties:
            liTotalCount:
              type: integer
            Products:
              type: array
              items:
                $ref: "#/components/schemas/Product"
          additionalProperties: true
    Product:
      type: object
      description: General product data. Field list can vary by `sFieldList`.
      properties:
        productCode:
          type: string
        longDescription:
          type: string
        shortDescription:
          type: string
        productSize:
          type: string
        productColour:
          type: string
        liTotalCount:
          type: integer
      additionalProperties: true
    StoreProductListResponse:
      oneOf:
        - type: array
          items:
            $ref: "#/components/schemas/StoreProduct"
        - type: object
          properties:
            liTotalCount:
              type: integer
            Products:
              type: array
              items:
                $ref: "#/components/schemas/StoreProduct"
          additionalProperties: true
    StoreProduct:
      type: object
      description: Store-specific product price, cost, quantity, tax and optional quantity-on-order data.
      properties:
        StoreCode:
          type: string
        ProductCode:
          type: string
        Price:
          type: number
          format: double
        Cost:
          type: number
          format: double
        QuantityAvailable:
          type: number
          format: double
        TaxGroup:
          type: string
        QuantityOnOrder:
          type: number
          format: double
      additionalProperties: true
    SerialNumberStatusResponse:
      oneOf:
        - type: integer
          enum:
            - -1
            - 0
            - 1
            - 2
            - 3
            - 4
            - 5
        - type: object
          properties:
            Status:
              type: integer
              enum:
                - -1
                - 0
                - 1
                - 2
                - 3
                - 4
                - 5
          additionalProperties: true
    Customer:
      type: object
      properties:
        CustomerCode:
          type: string
        EmailAddress:
          type: string
          format: email
        FirstName:
          type: string
        LastName:
          type: string
        CompanyName:
          type: string
        Address:
          type: string
        City:
          type: string
        RewardPoints:
          type: integer
      additionalProperties: true
    GlobalCustomer:
      type: object
      properties:
        EmailAddress:
          type: string
          format: email
        FirstName:
          type: string
        LastName:
          type: string
      additionalProperties: true
    StoreListResponse:
      oneOf:
        - type: array
          items:
            $ref: "#/components/schemas/Store"
        - type: object
          properties:
            Stores:
              type: array
              items:
                $ref: "#/components/schemas/Store"
            liTotalCount:
              type: integer
          additionalProperties: true
    Store:
      type: object
      properties:
        StoreCode:
          type: string
        StoreName:
          type: string
      additionalProperties: true
    CommitQuantityRequest:
      type: object
      properties:
        CommittedQuantities:
          type: array
          items:
            $ref: "#/components/schemas/CommittedQuantity"
      additionalProperties: true
    CommitQuantityResponse:
      type: object
      properties:
        CommittedQuantities:
          type: array
          items:
            $ref: "#/components/schemas/CommittedQuantity"
      additionalProperties: true
    CommittedQuantity:
      type: object
      properties:
        StoreCode:
          type: string
        OrderNumber:
          type: string
        ProductCode:
          type: string
        Quantity:
          type: number
          format: double
      additionalProperties: true
    CommitPointsRequest:
      type: object
      required:
        - CommittedPoints
      properties:
        CommittedPoints:
          type: array
          items:
            $ref: "#/components/schemas/CommittedPoints"
    CommittedPoints:
      type: object
      required:
        - StoreCode
        - OrderNumber
        - EmailAddress
        - Points
      properties:
        StoreCode:
          type: string
        OrderNumber:
          type: string
        EmailAddress:
          type: string
          format: email
        Points:
          type: integer
          description: Negative values commit points; positive values reverse committed points.
    SaleRequest:
      type: object
      required:
        - Sales
      properties:
        Sales:
          type: array
          items:
            $ref: "#/components/schemas/Sale"
    Sale:
      type: object
      required:
        - SaleDate
        - OrderNumber
        - StoreCode
      properties:
        SaleDate:
          type: string
          description: Sale date or date/time.
          example: "2020-07-30T18:00:00"
        OrderNumber:
          type: string
        StoreCode:
          type: string
        SaleTotal:
          oneOf:
            - type: string
            - type: number
              format: double
        OrderComment:
          type: string
        RewardPointsSpent:
          type: integer
          description: Omit when no reward points are spent.
        CustomerBillTo:
          $ref: "#/components/schemas/Customer"
        CustomerShipTo:
          $ref: "#/components/schemas/Customer"
        Items:
          type: array
          items:
            $ref: "#/components/schemas/SaleItem"
        Taxes:
          type: array
          items:
            $ref: "#/components/schemas/SaleTax"
        Discounts:
          type: array
          items:
