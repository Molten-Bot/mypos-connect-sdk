name: Build Stainless SDKs

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  STAINLESS_ORG: molten-ai
  STAINLESS_PROJECT: mypos-connect
  OAS_PATH: openapi.yaml
  CONFIG_PATH: stainless.yml
  FAIL_ON: warning

jobs:
  build:
    # Set the repository variable STAINLESS_ENABLED=true after the Stainless
    # GitHub App and molten-ai/mypos-connect project are connected.
    if: vars.STAINLESS_ENABLED == 'true'
    name: Preview or release build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run official Stainless build
        uses: stainless-api/upload-openapi-spec-action/build@fd70a2b6f380b00cad97b74ab14ab74918f96a65 # v1
        with:
          org: ${{ env.STAINLESS_ORG }}
          project: ${{ env.STAINLESS_PROJECT }}
          oas_path: ${{ env.OAS_PATH }}
          config_path: ${{ env.CONFIG_PATH }}
          fail_on: ${{ env.FAIL_ON }}
