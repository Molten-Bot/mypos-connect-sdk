name: Validate source contract

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: OpenAPI, invariants, and documentation
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.13.0 --activate

      - name: Install validation dependencies
        run: pnpm install --frozen-lockfile

      - name: Run local validation gate
        run: pnpm validate

  breaking-changes:
    name: OpenAPI breaking changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Compare OpenAPI contract with main
        uses: oasdiff/oasdiff-action/breaking@024f6c399f9a21ada1addb0f9a36ce1bfac995f1 # v0.1.6
        with:
          base: origin/main:openapi.yaml
          revision: HEAD:openapi.yaml
          fail-on: WARN
          review: false

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Scan changed commits for secrets
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          version: 3.95.9
          extra_args: --results=verified,unknown
