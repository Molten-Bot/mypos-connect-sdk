name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Publish the version declared in package.json from main
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package.json version
    if: inputs.confirm
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment:
      name: npm-release
      url: https://www.npmjs.com/package/@moltenbot/mypos-connect-sdk

    steps:
      - name: Check out source revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify source branch and package identity
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "Refusing to publish from $GITHUB_REF; dispatch this workflow from main" >&2
            exit 1
          fi

          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [ "$PACKAGE_NAME" != "@moltenbot/mypos-connect-sdk" ]; then
            echo "Refusing to publish unexpected package: $PACKAGE_NAME" >&2
            exit 1
          fi

          echo "Publishing $PACKAGE_NAME@$PACKAGE_VERSION from $GITHUB_SHA"

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify npm supports trusted publishing
        run: |
          npm --version
          node -e "const [major, minor, patch] = process.argv[1].split('.').map(Number); if (major < 11 || (major === 11 && (minor < 5 || (minor === 5 && patch < 1)))) process.exit(1)" "$(npm --version)"

      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.13.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release package
        run: pnpm validate

      - name: Publish package
        run: npm publish --provenance --access public
        env:
          # Required only to bootstrap the first version. Remove the environment
          # secret after configuring npm trusted publishing for later versions.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
