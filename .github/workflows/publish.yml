name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish (for example, v0.1.0)
        required: true
        type: string
      confirm:
        description: Confirm publication to the public npm registry
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ github.event.release.tag_name || inputs.tag }}
    if: >-
      (github.event_name == 'release' && !github.event.release.prerelease) ||
      (github.event_name == 'workflow_dispatch' && inputs.confirm)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment:
      name: npm-release
      url: https://www.npmjs.com/package/@molten-ai/mypos-connect-sdk

    steps:
      - name: Check out release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          fetch-depth: 0

      - name: Verify release tag and package identity
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [ "$PACKAGE_NAME" != "@molten-ai/mypos-connect-sdk" ]; then
            echo "Refusing to publish unexpected package: $PACKAGE_NAME" >&2
            exit 1
          fi

          if [ "$RELEASE_TAG" != "v$PACKAGE_VERSION" ] && [ "$RELEASE_TAG" != "$PACKAGE_VERSION" ]; then
            echo "Release tag $RELEASE_TAG does not match package version $PACKAGE_VERSION" >&2
            exit 1
          fi

          if ! git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"; then
            echo "Release tag $RELEASE_TAG does not exist" >&2
            exit 1
          fi

          TAG_COMMIT="$(git rev-parse "refs/tags/$RELEASE_TAG^{commit}")"
          HEAD_COMMIT="$(git rev-parse HEAD)"
          if [ "$TAG_COMMIT" != "$HEAD_COMMIT" ]; then
            echo "Checked-out commit does not match release tag $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify npm supports trusted publishing
        run: |
          npm --version
          node -e "const [major, minor] = process.argv[1].split('.').map(Number); if (major < 11 || (major === 11 && minor < 5)) process.exit(1)" "$(npm --version)"

      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.13.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release package
        run: pnpm validate

      - name: Publish with npm trusted publishing
        run: npm publish --provenance --access public
