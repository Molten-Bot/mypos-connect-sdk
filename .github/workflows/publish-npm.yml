name: Publish package to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-release
  cancel-in-progress: false

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: npm-release
    steps:
      - name: Check out release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node.js and npm registry
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.13.0 --activate

      - name: Verify package and release versions
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          if [ "$package_name" != "@molten-ai/mypos-connect-sdk" ]; then
            echo "Expected @molten-ai/mypos-connect-sdk, found $package_name" >&2
            exit 1
          fi

          if [ "$RELEASE_TAG" != "$package_version" ] && [ "$RELEASE_TAG" != "v$package_version" ]; then
            echo "Release tag $RELEASE_TAG does not match package version $package_version" >&2
            exit 1
          fi

      - name: Install validation dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release
        run: pnpm validate

      - name: Inspect package contents
        run: npm pack --dry-run

      - name: Publish package
        run: npm publish --access public --provenance
        env:
          # Used only to bootstrap the first release before npm trusted
          # publishing can be configured; OIDC takes precedence afterward.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
